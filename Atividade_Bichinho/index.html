<!DOCTYPE html>
<html lang="pt-br" data-theme="cupcake">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Meu Pet Virtual</title>

  <!-- DaisyUI + Tailwind -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;800&family=Nunito:wght@400;600&display=swap" rel="stylesheet"/>

  <style>
    body {
      font-family: 'Nunito', sans-serif;
      transition: background-color 2s ease-in-out;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-image: url('bg.png');
      background-color: #0d1b3e;
    }

    h1, .titulo { font-family: 'Baloo 2', cursive; }

    /* Estrelas animadas */
    #estrelas {
      display: none;
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    body.noite #estrelas { display: block; }

    .estrela {
      position: absolute;
      background: white;
      border-radius: 50%;
      animation: piscar 2s infinite alternate;
    }

    @keyframes piscar {
      from { opacity: 0.2; transform: scale(0.8); }
      to   { opacity: 1;   transform: scale(1.2); }
    }

    #b {
      animation: flutuar 3s ease-in-out infinite;
      filter: drop-shadow(0 8px 16px rgba(0,0,0,0.2));
    }

    @keyframes flutuar {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-12px); }
    }

    #btn {
      transition: transform 0.15s, filter 0.15s;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.15));
    }

    #btn:hover  { transform: scale(1.1); }
    #btn:active { transform: scale(0.93); }

    .glass-card {
      background: rgba(255,255,255,0.35);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.6);
    }

    /* Easter egg - botão escondido do Ferlini */
    #ferlini-btn {
      position: fixed;
      bottom: 8px;
      right: 8px;
      width: 28px;
      height: 28px;
      cursor: pointer;
      z-index: 999;
      background: white;
      border-radius: 50%;
    }

    #ferlini-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
    }

    #ferlini-modal.show { display: flex; }

    #ferlini-modal img {
      border-radius: 50%;
      border: 4px solid #f9a8d4;
      width: 180px;
      height: 180px;
      object-fit: cover;
    }
  </style>
</head>

<body class="min-h-screen flex flex-col">

  <!-- Estrelas (modo noite) -->
  <div id="estrelas"></div>

  <!-- TOPBAR -->
  <div class="relative z-10 w-full flex items-center justify-between p-4 gap-4 glass-card rounded-b-2xl">

    <div class="flex items-center gap-3">
      <div class="avatar">
        <div class="w-14 rounded-full ring ring-pink-300 ring-offset-base-100 ring-offset-2 shadow-md">
          <img id="avatar-img" src="b_n.png" alt="Avatar"/>
        </div>
      </div>
      <input
        id="nome-criatura"
        type="text"
        placeholder="Nome da criatura..."
        class="input input-bordered input-sm bg-white/70 font-semibold text-pink-700 placeholder-pink-300 rounded-xl shadow"
        style="font-family:'Baloo 2',cursive;"
        maxlength="20"
      />
    </div>

    <div class="flex items-center gap-3">
      <span id="status-badge" class="badge badge-lg badge-soft badge-success font-bold shadow">😊 Bem alimentado</span>

      <label class="flex items-center gap-2 cursor-pointer" title="Alternar dia/noite">
        <span class="text-lg">☀️</span>
        <input id="toggle-noite" type="checkbox" class="toggle toggle-primary" onchange="toggleModoManual()"/>
        <span class="text-lg">🌙</span>
      </label>
    </div>
  </div>

  <!-- MAIN -->
  <div class="relative z-10 flex-1 flex flex-col items-center justify-center gap-6 py-8">

    <div class="flex flex-col items-center gap-2">
      <p id="humor-texto" class="titulo text-2xl font-extrabold text-white drop-shadow-lg">Tá feliz da vida! 🌸</p>
      <img id="b" src="b_n.png" alt="Sua criatura" class="w-56 max-w-xs h-auto"/>
    </div>

    <div class="flex flex-col items-center gap-1">
      <p class="titulo text-sm font-bold text-black drop-shadow">Clique para alimentar</p>
      <img id="btn" src="btn.png" alt="Comida" onclick="alimentar()" class="w-24 h-auto cursor-pointer"/>
    </div>

    <!-- Barra de fome -->
    <div class="glass-card rounded-2xl px-6 py-3 flex flex-col items-center gap-2 shadow-lg w-64">
      <p class="titulo text-xs font-bold text-pink-700 tracking-wide uppercase">Nível de fome</p>
      <progress id="barra-fome" class="progress progress-error w-full" value="0" max="60"></progress>
      <p id="fome-texto" class="text-xs text-pink-500 font-semibold">Saciado 💖</p>
    </div>

  </div>

  <!-- Easter egg -->
  <button id="ferlini-btn" onclick="mostrarFerlini()">🌸</button>

  <div id="ferlini-modal" onclick="fecharFerlini()">
    <img src="ferlini.png" alt="Ferlini (vulgo Gostosinho)" onerror="this.style.display='none'"/>
    <p class="titulo text-white text-2xl font-extrabold drop-shadow-lg">
      Ferlini 😍<br/>
      <span class="text-pink-300 text-sm">Vulgo Gostosinho</span>
    </p>
    <p class="text-white/70 text-xs">Clique para fechar</p>
  </div>

  <script src="script.js"></script>
</body>
</html>
