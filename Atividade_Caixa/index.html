<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caixa Livre</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <style> 
	.topo {
		background: #ffc107;
		text-align: center;
		font-size: 43px;
		font-weight: bold;
		border: 2px solid #000faf;
	}

	.painel {
		background: #aaa;
		padding: 10px;
		margin-bottom: 15px;
		border: 2px solid #000faf;
	}

	.total {
		font-size: 32px;
		text-align: right;
		font-weight: bold;
	}

    </style>
</head>
<body class="bg-primary bg-gradient">
	<div class="container mt-3">
		<div class="topo"> CAIXA LIVRE </div>
  		
		<div class="row mt-3">
			
			<div class="col-md-7">
				<h3 class="text-white"> <span class="badge text-bg-prymari"> Sua Compra </span></h3>
				<ul id="lista" class="list-group lista"></ul>
			</div>
			
			<div class="col-md-5">
				
				<div class="painel">
					Total: R$ <span class="total">0.00</span>
				</div>

				<br>

				<div class="painel">
					<label>Código de barras</label>
					<input type="text" id="cod" class="form-control mb-3">

					<label>Quantidade</label>
					<input type="number" id="qtd" class="form-control" value="1">
				</div>
				
				<button class="btn btn-success w-100" onclick="addProduto()">
					Adicionar Produto
				</button>
			</div>
		</div>
	</div>
	
<script src="script.js"></script>
</body>
</html>
