<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Eventos</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.card {
    background: rgba(255,255,255,0.06);
    padding: 25px;
    border-radius: 16px;
    width: 350px;
    text-align: center; /* 🔥 PADRÃO DO SISTEMA */
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

/* 🔥 PADRÃO ÚNICO INPUT + SELECT */
input, select {
    width: 100%;
    height: 40px;
    padding: 0 10px;
    margin: 6px 0;
    border-radius: 10px;
    border: none;
    background: rgba(255,255,255,0.08);
    color: white;
    outline: none;
    box-sizing: border-box;
    font-size: 14px;
}

/* 🔥 SELECT WRAPPER */
.select-wrapper {
    position: relative;
    width: 100%;
}

/* 🔥 SETA */
.select-wrapper::after {
    content: "▼";
    font-size: 12px;
    color: #e2e8f0;
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    pointer-events: none;
}

/* 🔥 SELECT LIMPO */
select {
    appearance: none;
    -webkit-appearance: none;
    -moz-appearance: none;
    cursor: pointer;
    padding-right: 30px;
}

/* 🔥 OPÇÕES */
select option {
    background: #1e293b;
    color: #e2e8f0;
}

/* 🔥 FOCO PADRÃO */
input:focus, select:focus {
    background: rgba(255,255,255,0.12);
    transform: scale(1.02);
}

/* BOTÃO */
button {
    width: 100%;
    height: 40px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    background: linear-gradient(90deg, #3b82f6, #06b6d4);
    color: white;
    font-weight: bold;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.03);
    box-shadow: 0 0 15px rgba(59,130,246,0.4);
}

/* LINK */
a {
    color: #93c5fd;
    text-decoration: none;
    display: block;
    margin-top: 10px;
    text-align: center;
    opacity: 0.8;
}

a:hover {
    opacity: 1;
}

/* RESULTADO */
p {
    margin: 6px 0;
}
</style>
</head>

<body>

<div class="card">
    <h2>🎉 Eventos</h2>

    <div class="select-wrapper">
        <select id="pacote">
            <option value="standard">Standard</option>
            <option value="premium">Premium</option>
            <option value="deluxe">Deluxe</option>
        </select>
    </div>

    <input id="pessoas" type="number" placeholder="Quantidade de pessoas">

    <button onclick="calcularEvento()">Calcular</button>

    <p>Total: <span id="eventoOut"></span></p>

    <a href="index.html">⬅ Voltar</a>
</div>

<script src="script.js"></script>
</body>
</html>
